<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Optra Pharm TWA</title>
    <!-- External Libraries -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black">
    <!-- Preloader -->
    <div id="loader">
        <div class="loader-content">
            <div class="loader-logo-text">OPTRA</div>
            <div class="loader-sub-text">Pharmacology</div>
            <div class="loader-line-container">
                <div class="loader-line-progress"></div>
            </div>
        </div>
    </div>
    
    <div id="app" class="pb-28">
        <!-- Header -->
        <header class="sticky top-0 z-40 glass px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div>
                    <h1 class="text-[19px] font-extrabold tracking-tight leading-none mb-0.5 text-white">OPTRA</h1>
                    <p class="text-[10px] text-[#FFB800] font-bold uppercase tracking-[0.2em]">Pharmacology</p>
                </div>
            </div>
            <div class="flex gap-2.5">
                <div class="relative flex items-center">
                    <input type="text" id="search-input" 
                           placeholder="Поиск..." 
                           class="w-0 opacity-0 focus:w-40 focus:opacity-100 focus:px-4 py-2 bg-[#111112] border border-white/10 rounded-xl text-xs text-white transition-all duration-300 outline-none">
                    <button id="search-btn" class="w-11 h-11 rounded-[14px] glass-card flex items-center justify-center">
                        <i data-lucide="search" class="w-5 h-5 text-white opacity-60"></i>
                    </button>
                </div>
                <button id="cart-btn" class="w-11 h-11 rounded-[14px] glass-card flex items-center justify-center relative">
                    <i data-lucide="shopping-bag" class="w-5 h-5 text-white opacity-60"></i>
                    <div id="cart-badge" class="absolute -top-1 -right-1 w-5 h-5 bg-[#FFB800] text-black text-[10px] font-black rounded-full flex items-center justify-center hidden">0</div>
                </button>
                <button id="admin-panel-btn" class="w-11 h-11 rounded-[14px] bg-[#FFB800] flex items-center justify-center hidden">
                    <i data-lucide="settings" class="w-5 h-5 text-black"></i>
                </button>
            </div>
        </header>

        <!-- Slider -->
        <div class="px-6 mt-8 overflow-x-auto no-scrollbar flex gap-4">
            <div class="min-w-[88vw] h-52 rounded-[36px] bg-[#0A0A0B] border border-white/5 flex flex-col justify-end p-7 relative overflow-hidden">
                <img src="assets/img/photo_2026-05-03_13-41-41.jpg" class="absolute inset-0 w-full h-full object-cover opacity-50 transition-all duration-700 hover:opacity-80" alt="Somatropix">
                <div class="absolute inset-0 bg-gradient-to-t from-[#0A0A0B] via-[#0A0A0B]/20 to-transparent pointer-events-none"></div>
                <div class="mb-5 relative z-10">
                    <span class="px-3.5 py-1.5 rounded-full bg-[#FFB800]/10 text-[10px] font-black text-[#FFB800] border border-[#FFB800]/20 uppercase tracking-widest">Premium Choice</span>
                </div>
                <h2 class="text-[26px] font-extrabold mb-1 text-white tracking-tight relative z-10">Somatropix</h2>
                <p class="text-sm text-white/50 font-medium relative z-10">Advanced HGH Formulation</p>
            </div>
        </div>

        <!-- Categories -->
        <div class="px-6 mt-8">
            <div class="flex gap-3 overflow-x-auto no-scrollbar">
                <button class="category-pill active" onclick="filterProducts('all', this)">Все товары</button>
                <button class="category-pill" onclick="filterProducts('inject', this)">Инъекции</button>
                <button class="category-pill" onclick="filterProducts('oral', this)">Оральные</button>
                <button class="category-pill" onclick="filterProducts('peptide', this)">Пептиды</button>
            </div>
        </div>

        <!-- Product Grid -->
        <div class="px-6 mt-8">
            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-widest mb-4 text-white">Популярное</h3>
            <div class="grid grid-cols-2 gap-4" id="product-grid">
                <!-- Products will be injected here via script.js -->
            </div>
        </div>
    </div>

    <!-- Cart Drawer -->
    <div id="cart-drawer-backdrop" class="fixed inset-0 bg-black/80 opacity-0 pointer-events-none transition-opacity duration-500 z-50"></div>
    <div id="cart-drawer" class="fixed bottom-0 left-0 right-0 glass rounded-t-[40px] z-50 bottom-sheet max-h-[85vh] flex flex-col">
        <div class="w-16 h-1 bg-white/10 rounded-full mx-auto my-4 shrink-0"></div>
        <div class="px-8 pb-4 flex justify-between items-center shrink-0">
            <h2 class="text-2xl font-bold text-white">Корзина</h2>
            <button onclick="closeCart()" class="text-gray-500"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto px-8 py-4 space-y-4 no-scrollbar">
            <!-- Items injected here -->
        </div>
        <div class="px-8 py-8 border-t border-white/5 shrink-0 bg-[#0A0A0B]/80 backdrop-blur-xl">
            <div class="flex justify-between items-center mb-6">
                <span class="text-gray-400">Итого:</span>
                <span id="cart-total" class="text-2xl font-black text-white">$0</span>
            </div>
            <button onclick="handleCheckout()" class="w-full btn-primary py-5 rounded-2xl text-sm font-black uppercase tracking-widest">
                Оформить заказ
            </button>
        </div>
    </div>
    <div id="product-modal-backdrop" class="fixed inset-0 bg-black/80 opacity-0 pointer-events-none transition-opacity duration-500 z-50"></div>
    <div id="product-modal" class="fixed bottom-0 left-0 right-0 glass rounded-t-[40px] z-50 bottom-sheet max-h-[95vh] overflow-y-auto no-scrollbar">
        <div class="w-16 h-1 bg-white/10 rounded-full mx-auto my-4"></div>
        <div class="px-8 pb-10">
            <div class="w-full aspect-[4/5] rounded-[32px] product-image-container mb-8 flex items-center justify-center relative overflow-hidden" id="modal-image-container">
                <!-- Image or icon will be injected here -->
            </div>
            
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 class="text-3xl font-bold tracking-tight mb-1 text-white" id="modal-title">---</h2>
                    <p class="text-[#FFB800] font-medium text-sm tracking-wider uppercase" id="modal-brand">---</p>
                </div>
                <div class="text-2xl font-bold text-white" id="modal-price">---</div>
            </div>

            <!-- Tabs -->
            <div class="flex gap-6 border-b border-white/5 mb-6 overflow-x-auto no-scrollbar">
                <button class="tab-btn pb-4 text-sm font-bold uppercase tracking-widest text-white active" onclick="switchTab('details', this)">Описание</button>
                <button class="tab-btn pb-4 text-gray-500 text-sm font-bold uppercase tracking-widest" onclick="switchTab('protocol', this)">Протокол</button>
            </div>
            
            <div id="tab-content" class="text-base text-gray-400 leading-relaxed mb-10 min-h-[100px] transition-opacity duration-200">
                <div id="tab-details">---</div>
                <div id="tab-protocol" class="hidden">---</div>
            </div>

            <button id="add-to-cart-btn" onclick="addToCartFromModal()" class="w-full btn-primary py-5 rounded-2xl flex items-center justify-center gap-3 active:scale-[0.98] transition-all duration-200">
                <span class="text-sm font-black uppercase tracking-widest">Добавить в заказ</span>
                <span class="w-px h-4 bg-black/20"></span>
                <span id="modal-price-btn" class="text-sm font-black tracking-widest">---</span>
            </button>
        </div>
    </div>

    <!-- Admin Modal -->
    <div id="admin-modal-backdrop" class="fixed inset-0 bg-black/80 opacity-0 pointer-events-none transition-opacity duration-500 z-50"></div>
    <div id="admin-modal" class="fixed bottom-0 left-0 right-0 glass rounded-t-[40px] z-50 bottom-sheet max-h-[90vh] overflow-y-auto no-scrollbar">
        <div class="w-16 h-1 bg-white/10 rounded-full mx-auto my-4"></div>
        <div class="px-8 pb-10">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-white">Админ панель</h2>
                <button onclick="closeAdmin()" class="text-gray-500"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>

            <!-- Admin Tabs -->
            <div class="flex gap-4 mb-6 border-b border-white/5">
                <button onclick="switchAdminTab('products')" class="admin-tab-btn pb-3 text-sm font-bold uppercase tracking-widest text-[#FFB800] active" data-tab="products">Товары</button>
                <button onclick="switchAdminTab('orders')" class="admin-tab-btn pb-3 text-gray-500 text-sm font-bold uppercase tracking-widest" data-tab="orders">Заказы</button>
            </div>

            <!-- Products Section -->
            <div id="admin-products-section">
            <div class="bg-[#111112] rounded-[24px] p-6 mb-8 border border-white/5">
                <h3 class="text-sm font-bold uppercase tracking-widest text-[#FFB800] mb-4" id="admin-form-title">Добавить товар</h3>
                <input type="hidden" id="admin-product-id">
                <div class="space-y-4">
                    <input type="text" id="admin-name" placeholder="Название товара" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-[#FFB800]/50 transition-colors">
                    <input type="text" id="admin-brand" placeholder="Бренд (напр. ZPHC)" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-[#FFB800]/50 transition-colors">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="admin-price" placeholder="Цена ($)" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-[#FFB800]/50 transition-colors">
                        <select id="admin-category" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-[#FFB800]/50 transition-colors appearance-none">
                            <option value="inject">Инъекции</option>
                            <option value="oral">Оральные</option>
                            <option value="peptide">Пептиды</option>
                        </select>
                    </div>
                    <input type="text" id="admin-image" placeholder="Путь к фото (напр. assets/img/photo...)" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-[#FFB800]/50 transition-colors">
                    <textarea id="admin-desc" placeholder="Описание товара" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-[#FFB800]/50 transition-colors h-24"></textarea>
                    <textarea id="admin-protocol" placeholder="Протокол применения" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-[#FFB800]/50 transition-colors h-20"></textarea>
                    
                    <div class="flex gap-2">
                        <button onclick="saveProduct()" id="admin-save-btn" class="flex-1 bg-[#FFB800] text-black font-black py-4 rounded-xl uppercase tracking-widest text-xs">
                            Сохранить
                        </button>
                        <button onclick="resetAdminForm()" id="admin-cancel-btn" class="hidden flex-1 bg-white/10 text-white font-bold py-4 rounded-xl uppercase tracking-widest text-xs">
                            Отмена
                        </button>
                    </div>
                </div>
            </div>

            <div class="mb-6">
                <button onclick="emergencySeed()" class="w-full bg-red-500/10 text-red-400 font-black py-3 rounded-xl uppercase tracking-widest text-xs border border-red-500/20">
                    🚨 Загрузить все товары (40+ штук)
                </button>
            </div>
            
            <div id="admin-product-list" class="space-y-4">
                <!-- Product list for editing/deleting -->
            </div>
            </div>

            <!-- Orders Section -->
            <div id="admin-orders-section" class="hidden">
                <div class="mb-4 flex gap-2">
                    <button onclick="filterOrders('all')" class="order-filter-btn px-4 py-2 rounded-xl bg-[#FFB800]/10 text-[#FFB800] text-xs font-bold uppercase tracking-widest active" data-filter="all">Все</button>
                    <button onclick="filterOrders('pending')" class="order-filter-btn px-4 py-2 rounded-xl bg-white/5 text-gray-400 text-xs font-bold uppercase tracking-widest" data-filter="pending">Новые</button>
                    <button onclick="filterOrders('accepted')" class="order-filter-btn px-4 py-2 rounded-xl bg-white/5 text-gray-400 text-xs font-bold uppercase tracking-widest" data-filter="accepted">Принятые</button>
                    <button onclick="filterOrders('rejected')" class="order-filter-btn px-4 py-2 rounded-xl bg-white/5 text-gray-400 text-xs font-bold uppercase tracking-widest" data-filter="rejected">Отклоненные</button>
                </div>
                <div id="admin-orders-list" class="space-y-4">
                    <!-- Orders will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Script -->
    <script src="script.js"></script>
</body>
</html>
